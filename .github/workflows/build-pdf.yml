name: Release TFM PDF

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v4

      - name: Compilar documento
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: latexmk
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Crear Release y adjuntar PDF
        uses: softprops/action-gh-release@v2
        with:
          files: main.pdf
          name: "Versión ${{ github.ref_name }}"
          body: "Compilación automática del TFM."
          draft: false
          prerelease: false
